<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Archivum — Mobile Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --blue:#2563EB;--blue-l:#EFF6FF;--blue-m:#DBEAFE;
    --green:#16A34A;--green-l:#F0FDF4;
    --yellow:#D97706;--yellow-l:#FFFBEB;
    --red:#DC2626;--red-l:#FEF2F2;
    --gray:#6B7280;--gray-l:#F3F4F6;
    --bg:#F9FAFB;--surface:#FFFFFF;--text:#111827;--muted:#6B7280;--border:#E5E7EB;
    --dbg:#111827;--dsurf:#1F2937;--dsurf2:#374151;--dtext:#F9FAFB;--dmuted:#9CA3AF;--dborder:#374151;
    --r-card:14px;--r-chip:8px;--r-btn:10px;
    --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
    --shadow-md:0 4px 12px rgba(0,0,0,.1);
  }
  html,body{background:#E5E7EB;font-family:var(--font);min-height:100%;}
  /* Phone frame */
  .phone{width:375px;height:812px;background:var(--bg);border-radius:44px;overflow:hidden;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.25),0 0 0 1px rgba(0,0,0,.1);flex-shrink:0;}
  .phone.dark{background:var(--dbg);}
  .phone-screen{width:100%;height:100%;overflow:hidden;position:relative;display:flex;flex-direction:column;}
  /* Status bar */
  .status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:12px 24px 0;flex-shrink:0;font-size:12px;font-weight:600;}
  /* Bottom safe area */
  .home-ind{height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .home-ind-bar{width:134px;height:5px;background:rgba(0,0,0,.2);border-radius:3px;}
  .dark .home-ind-bar{background:rgba(255,255,255,.2);}
  /* Scrollable content */
  .screen-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  .screen-body::-webkit-scrollbar{display:none;}
  /* Bottom tab bar */
  .tab-bar{height:49px;display:flex;align-items:center;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:0 4px;}
  .dark .tab-bar{background:var(--dsurf);border-color:var(--dborder);}
  .tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;padding:4px 0;position:relative;}
  .tab-item svg{width:22px;height:22px;}
  .tab-label{font-size:10px;font-weight:500;}
  /* Cards */
  .card{background:var(--surface);border-radius:var(--r-card);box-shadow:var(--shadow);padding:16px;}
  .dark .card{background:var(--dsurf);}
  /* Chips */
  .chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;}
  /* Badges */
  .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
  .badge-green{background:var(--green-l);color:var(--green);}
  .badge-yellow{background:var(--yellow-l);color:var(--yellow);}
  .badge-red{background:var(--red-l);color:var(--red);}
  .badge-gray{background:var(--gray-l);color:var(--gray);}
  .badge-blue{background:var(--blue-l);color:var(--blue);}
  /* Inputs */
  .inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-btn);font-size:15px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;}
  .inp:focus{border-color:var(--blue);}
  .dark .inp{background:var(--dsurf2);border-color:var(--dborder);color:var(--dtext);}
  /* Buttons */
  .btn-primary{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-btn);font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;}
  .btn-secondary{width:100%;padding:13px;background:transparent;color:var(--blue);border:1.5px solid var(--blue);border-radius:var(--r-btn);font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;}
  /* FAB */
  .fab{position:absolute;bottom:70px;right:20px;width:52px;height:52px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.4);cursor:pointer;z-index:10;}
  /* Doc row */
  .doc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);}
  .dark .doc-row{background:var(--dsurf);border-color:var(--dborder);}
  /* Section headers in gallery */
  .section-header{display:flex;flex-direction:column;gap:4px;margin-bottom:20px;}
  /* Skeleton shimmer */
  @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
  .skeleton{background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
  .dark .skeleton{background:linear-gradient(90deg,#374151 25%,#4B5563 50%,#374151 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;}
  /* Pulse for live dot */
  @keyframes pulse-ring{0%{transform:scale(1);opacity:.7}70%{transform:scale(1.6);opacity:0}100%{transform:scale(1.6);opacity:0}}
  .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--green);position:relative;display:inline-block;}
  .pulse-dot::after{content:'';position:absolute;inset:-2px;border-radius:50%;background:var(--green);animation:pulse-ring 1.8s infinite;}
  /* Bottom sheet overlay */
  .sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:20;display:flex;flex-direction:column;justify-content:flex-end;}
  .sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:0 0 20px;}
  .dark .sheet{background:var(--dsurf);}
  .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
  /* Gallery wrapper */
  .gallery{display:flex;flex-wrap:wrap;gap:32px;padding:40px;justify-content:center;align-items:flex-start;}
  .screen-group{display:flex;flex-direction:column;gap:12px;align-items:center;}
  .screen-label{font-size:13px;font-weight:600;color:#374151;text-align:center;letter-spacing:.3px;}
  .screen-sublabel{font-size:11px;color:#9CA3AF;text-align:center;}
  /* Page title */
  .page-title{font-size:28px;font-weight:800;color:var(--text);padding:20px 20px 0;}
  .dark .page-title{color:var(--dtext);}
  /* Group label */
  .group-label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#9CA3AF;padding:32px 40px 8px;width:100%;}
  /* Swipe hint */
  .swipe-actions{position:absolute;right:0;top:0;height:100%;display:flex;align-items:center;}
  .swipe-btn{height:100%;display:flex;align-items:center;justify-content:center;padding:0 18px;font-size:12px;font-weight:600;color:#fff;}
  /* Progress bar */
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}
  /* Chart container */
  .chart-wrap{position:relative;height:160px;}
  /* Avatar */
  .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;}
  /* Step indicator */
  .step-dot{width:8px;height:8px;border-radius:50%;}
</style>
</head>
<body>

// ─── Archivum Logo Components ────────────────────────────────────────────────
// Reconstructed from brand asset: two overlapping document shapes (navy + teal)
// with the wordmark "archivum" in a rounded-sans font.
function ArchivumLogo({size=48, showWordmark=true}) {
  const u = size;
  // Document icon: back page (teal/cyan), front page (navy), slightly offset
  return (
    <div style={{display:'flex',alignItems:'center',gap:showWordmark ? Math.round(u*0.18) : 0}}>
      {/* Icon mark */}
      <svg width={u} height={Math.round(u*1.02)} viewBox="0 0 100 102" fill="none" aria-hidden="true">
        {/* Back document — teal, rotated slightly to the right */}
        <g transform="rotate(8, 50, 51)">
          <rect x="16" y="12" width="62" height="78" rx="8" fill="#3BBFCE"/>
          <rect x="28" y="30" width="38" height="5" rx="2.5" fill="rgba(255,255,255,0.55)"/>
          <rect x="28" y="42" width="28" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
          <rect x="28" y="53" width="32" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
          {/* Folded top-right corner */}
          <path d="M63 12 L78 12 L78 26 Z" fill="rgba(0,0,0,0.12)"/>
          <path d="M63 12 L63 26 L78 26" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" fill="none"/>
        </g>
        {/* Front document — deep navy, slightly left */}
        <g transform="rotate(-5, 50, 51)">
          <rect x="12" y="10" width="62" height="78" rx="8" fill="#0F2B5B"/>
          <rect x="24" y="28" width="38" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>
          <rect x="24" y="40" width="28" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
          <rect x="24" y="51" width="32" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
          <rect x="24" y="62" width="20" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
          {/* Folded top-right corner */}
          <path d="M59 10 L74 10 L74 25 Z" fill="rgba(0,0,0,0.15)"/>
          <path d="M59 10 L59 25 L74 25" stroke="rgba(255,255,255,0.25)" strokeWidth="1.5" fill="none"/>
        </g>
      </svg>
      {showWordmark && <ArchivumWordmark size={Math.round(u * 0.48)} color="#0F2B5B"/>}
    </div>
  );
}

function ArchivumWordmark({size=22, color='#0F2B5B'}) {
  return (
    <svg width={Math.round(size * 5.2)} height={size} viewBox="0 0 208 40" fill="none" aria-label="archivum">
      {/* "archivum" — geometric rounded letterforms traced from wordmark */}
      <text
        x="0" y="31"
        fontFamily="'Inter', system-ui, sans-serif"
        fontSize="32"
        fontWeight="700"
        letterSpacing="-0.5"
        fill={color}
      >archivum</text>
    </svg>
  );
}

// ─── Reusable Phone Shell ────────────────────────────────────────────────────
function Phone({dark=false, children, noTabs=false, activeTab='home', onTab, className=''}) {
  const d = dark;
  const textColor = d ? '#F9FAFB' : '#111827';
  const mutedColor = d ? '#9CA3AF' : '#6B7280';
  const tabs = [
    {id:'home', label:'Inicio', icon:Ico.home},
    {id:'library', label:'Biblioteca', icon:Ico.library},
    {id:'search', label:'Buscar', icon:Ico.search},
    {id:'companies', label:'Empresas', icon:Ico.companies},
    {id:'settings', label:'Ajustes', icon:Ico.settings},
  ];
  return (
    <div className={`phone ${d?'dark':''} ${className}`} style={{fontFamily:'var(--font)'}}>
      <div className="phone-screen">
        {/* Status bar */}
        <div className="status-bar" style={{color:textColor}}>

function SearchScreen({dark=false}) {

          {query && <button onClick={()=>setQuery('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:muted,fontSize:18,lineHeight:1}}>×</button>}
        </div>
        {/* Filter chips */}
        <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4,scrollbarWidth:'none'}}>
          {['Facturas','Pendiente','2025','€ > 1.000'].map((c,i)=>(
            <span key={c} className="chip" style={{background:'var(--blue-l)',color:'var(--blue)',border:'1px solid var(--blue-m)',fontSize:12}}>
              {c} <span style={{marginLeft:4,opacity:.6}}>×</span>

          ))}
          <button onClick={()=>setSortOpen(!sortOpen)} className="chip" style={{background:surf,color:muted,border:`1px solid ${bdr}`,fontFamily:'var(--font)',cursor:'pointer'}}>
            {React.cloneElement(Ico.sort,{style:{width:13,height:13}})} {activeSort}
          </button>
        </div>
        <div style={{fontSize:12,color:muted,marginTop:6}}>8 resultados para "{query}"</div>
      </div>

      {/* Results */}
      <div className="screen-body">
        <div style={{background:surf}}>
          {RECENT_DOCS.concat(RECENT_DOCS).slice(0,8).map((doc,i)=>(
            <DocRow key={i} doc={{...doc,id:doc.id.replace(/\d+$/,s=>(parseInt(s)+i).toString().padStart(4,'0'))}} dark={d}/>
          ))}
        </div>
      </div>

      {/* Sort sheet */}
      {sortOpen && (
        <div className="sheet-overlay" onClick={()=>setSortOpen(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div style={{padding:'14px 20px 6px',fontSize:16,fontWeight:700,color:'var(--text)'}}>Ordenar por</div>
            {sorts.map(s=>(
              <button key={s} onClick={()=>{setActiveSort(s);setSortOpen(false);}}

        </div>

    </div>
